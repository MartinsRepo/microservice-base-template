services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: microservice-base-template
    container_name: microservice-base-template
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      SERVICE_NAME: ${SERVICE_NAME:-microservice-base-template}
      HOST: 0.0.0.0
      PORT: 3000
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
